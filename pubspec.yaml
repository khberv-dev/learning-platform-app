name: student
description: "Mobile app for iTeach students"
publish_to: 'none'
version: 0.0.6+6

environment:
  sdk: ^3.11.4

dependencies:
  audioplayers: ^6.1.0
  chewie: ^1.8.5
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_riverpod: ^3.3.1
  flutter_svg: ^2.2.4
  flutter_webrtc: ^1.4.1
  go_router: ^17.2.2
  google_fonts: ^8.0.2
  package_info_plus: ^10.1.0
  path_provider: ^2.1.5
  pinput: ^6.0.2
  record: ^6.0.0
  shared_preferences: ^2.5.5
  socket_io_client: ^2.0.0
  talker_dio_logger: ^5.1.16
  url_launcher: ^6.3.2
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  image_path: assets/images/brand.png
  android: true
  ios: true
  remove_alpha_ios: true